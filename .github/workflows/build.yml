name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        # ה-Action הזה יוריד ויתקין את Gradle באופן אוטומטי
        # ללא צורך בקבצים בתיקיית ה-wrapper

      - name: Build with Gradle
        run: gradle assembleDebug --no-daemon
